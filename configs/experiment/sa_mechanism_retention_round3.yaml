experiment_name: sa_mechanism_retention_round3
inherits: configs/experiment/sa_mechanism_policy_round2.yaml
output_root: artifacts/training/sa_mechanism_retention_round3
seeds: [7, 13, 29]

scope:
  objective: late_training_mechanism_auxiliary_retention
  frozen_components:
    - VecWorkflowCoreEnv semantics
    - reward main definition
    - benchmark split
    - popularity_cache_heuristic policy
    - benchmark metric definitions

training:
  script: scripts/train_sa_ghmappo_real_sample.py
  profile: sa_mechanism_retention_round3
  episodes: 64
  update_every: 4
  batch_size: 32
  learning_rate: 0.00006
  clip_ratio: 0.08
  entropy_coef: 0.001
  value_coef: 0.85
  auxiliary_coef: 0.28
  checkpoint_selection:
    - best_by_advantage_score
    - best_by_mechanism_advantage_score
    - best_by_round2_mechanism_score
    - best_by_retained_mechanism_score
  mechanism_policy_guidance:
    mechanism_aux_coef: 0.08
    mechanism_window_weight: 1.35
    prepare_action_prior_weight: 0.55
    mechanism_entropy_coef: 0.0005
  late_training_retention:
    mechanism_retention_start_update: 8
    mechanism_aux_coef_floor_after_update: 0.10
    mechanism_window_weight_floor_after_update: 1.40
    mechanism_entropy_floor_after_update: 0.0008
    retained_mechanism_score_weight: conservative_reward_continuity_failure_backhaul_guarded
    round3_checkpoint_label: best_by_retained_mechanism_score
  mechanism_sampling:
    mechanism_window_oversample_ratio: 2.0
    handoff_imminent_oversample_ratio: 1.5
    target_mismatch_sample_weight: 1.5
    min_mechanism_activating_windows: 2

benchmark:
  script: scripts/benchmark_main_results.py
  agents:
    - sa_ghmappo
    - reactive_greedy
    - popularity_cache_heuristic
  seeds: [7, 13, 29]
  window_modes:
    - mixed_informative
    - full_stratified
