experiment_name: top_journal_mechanism_v13_prd_option
output_root: artifacts/training/top_journal_mechanism_v13_prd_option
seeds: [7, 13, 29, 41, 53]

scope:
  objective: widen_v12_reward_margin_with_algorithmic_prd_option_credit
  parent_profile: top_journal_mechanism_v12_learned_option
  split_protocol: strict_split_v1_20260621
  claim_boundary: full_dev_evidence_only_until_future_validation
  hidden_holdout_policy: consumed_hidden_never_used_for_selection
  frozen_components:
    - VecWorkflowCoreEnv reward definition
    - semantic_discrete_5 action contract
    - controller-level baseline contracts
    - existing hidden holdout rows and statistics

training:
  script: scripts/train_sa_ghmappo_real_sample.py
  profile: top_journal_mechanism_v13_prd_option
  episodes: 128
  update_every: 8
  batch_size: 32
  max_steps: 16
  max_mobility_rows: 10000
  train_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/train_window_plan.json
  dev_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/dev_window_plan.json
  checkpoint_selection_rule: latest_after_prd_training
  algorithmic_change:
    name: partial_reward_decoupled_mappo_event_and_option_credit
    basis:
      - MAPPO controller-level centralized training with decentralized execution
      - partial reward / partial credit assignment for multi-controller option updates
      - hierarchical option policy for mechanism-vs-safe-action selection
    option_gate_mechanism_preserve_enabled: true
    option_gate_prd_enabled: true
    option_gate_prd_coef: 0.24
    option_gate_prd_clip: 1.6
    event_prd_advantage_enabled: true
    event_prd_advantage_coef: 0.38
    event_prd_advantage_clip: 1.8
    rationale: keep MAPPO as the mechanism-window policy, but inject partial reward decoupled credit into the event head and option head so mechanism actions receive sharper learning signal without evaluator-side hard overrides. Full-dev evidence showed best_by_reward stayed at the warm-start checkpoint; latest_after_prd_training is used to evaluate the learned PRD policy directly.
  safety_constraints:
    reward_definition_changed: false
    action_contract_changed: false
    evaluator_window_class_gate_enabled: false
    hidden_used_for_selection: false

evaluation:
  allowed_selection_splits:
    - train
    - dev
  prohibited_selection_splits:
    - hidden_holdout
  future_validation_required_for_promotion: true
  dev_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/dev_window_plan.json
  full_dev_protocol:
    seeds: [7, 13, 29, 41, 53]
    windows: 20
    workflows_per_window: 2
    primary_vehicle_selection: handoff_pressure
    window_mode: full_stratified
  required_claim_checks:
    - sa_total_reward_above_v12_full_dev
    - sa_total_reward_above_all_compared_agents
    - mechanism_window_reward_margin_increased_without_idle_sparse_regression
