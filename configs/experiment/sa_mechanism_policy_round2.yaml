experiment_name: sa_mechanism_policy_round2
output_root: artifacts/training/sa_mechanism_policy_round2
seeds: [7, 13, 29]

scope:
  objective: agent_side_mechanism_window_policy_strengthening
  frozen_components:
    - VecWorkflowCoreEnv semantics
    - reward main definition
    - benchmark split
    - popularity_cache_heuristic policy
    - benchmark metric definitions

data:
  mobility_source: ngsim
  workflow_csv_path: data/raw/workflow/alibaba2018/batch_task.csv
  max_mobility_rows: 2500
  max_workflows: 2
  workflow_selector: ordered
  min_tasks: 5
  max_tasks: 20

scenario:
  rsu_layout: auto_dominant_tight
  frame_offset: 0
  window_length: 24
  window_selector: max_handoff_candidate
  window_count: 3
  window_scan_stride: 2
  train_window_mode: sampled
  eval_window_modes:
    - mixed_informative
    - full_stratified
  max_steps: 12

training:
  script: scripts/train_sa_ghmappo_real_sample.py
  profile: sa_mechanism_policy_round2
  episodes: 64
  update_every: 4
  batch_size: 32
  learning_rate: 0.00006
  clip_ratio: 0.08
  entropy_coef: 0.001
  value_coef: 0.85
  auxiliary_coef: 0.28
  checkpoint_selection:
    - best_by_advantage_score
    - best_by_mechanism_advantage_score
    - best_by_round2_mechanism_score
  mechanism_policy_guidance:
    mechanism_aux_coef: 0.08
    mechanism_window_weight: 1.35
    prepare_action_prior_weight: 0.55
    mechanism_entropy_coef: 0.0005
  mechanism_sampling:
    mechanism_window_oversample_ratio: 2.0
    handoff_imminent_oversample_ratio: 1.5
    target_mismatch_sample_weight: 1.5
    min_mechanism_activating_windows: 2

benchmark:
  script: scripts/benchmark_main_results.py
  agents:
    - sa_ghmappo
    - reactive_greedy
    - popularity_cache_heuristic
  seeds: [7, 13, 29]
  window_modes:
    - mixed_informative
    - full_stratified
