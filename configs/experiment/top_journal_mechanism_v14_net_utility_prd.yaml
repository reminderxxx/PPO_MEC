experiment_name: top_journal_mechanism_v14_net_utility_prd
output_root: artifacts/training/top_journal_mechanism_v14_net_utility_prd
seeds: [7, 13, 29, 41, 53]

scope:
  objective: widen_v13_reward_margin_and_remove_backhaul_blocker_with_net_utility_prd_mappo
  parent_profile: top_journal_mechanism_v13_prd_option
  split_protocol: strict_split_v1_20260621
  claim_boundary: full_dev_evidence_only_until_future_validation
  hidden_holdout_policy: consumed_hidden_never_used_for_selection
  frozen_components:
    - VecWorkflowCoreEnv reward definition
    - semantic_discrete_5 action contract
    - controller-level baseline contracts
    - existing hidden holdout rows and statistics

training:
  script: scripts/train_sa_ghmappo_real_sample.py
  profile: top_journal_mechanism_v14_net_utility_prd
  episodes: 128
  update_every: 8
  batch_size: 32
  max_steps: 16
  max_mobility_rows: 10000
  train_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/train_window_plan.json
  dev_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/dev_window_plan.json
  checkpoint_selection_rule: latest_after_net_utility_prd_training
  algorithmic_change:
    name: constrained_net_utility_partial_reward_decoupled_mappo
    basis:
      - MAPPO centralized training with decentralized controller heads
      - partial reward decoupling for event and option credit assignment
      - constrained policy optimization / Lagrangian cost pressure for backhaul and migration overhead
    net_utility_prd_enabled: true
    net_utility_backhaul_coef: 0.16
    net_utility_migration_coef: 0.22
    net_utility_expired_prefetch_coef: 0.55
    net_utility_idle_prefetch_penalty: 0.65
    net_utility_success_bonus: 0.16
    net_utility_cost_dual_enabled: true
    net_utility_option_termination_enabled: true
    rationale: preserve v13 PRD mechanism-window reward gains while making event and option advantages cost-sensitive, so idle expired prefetch and high-backhaul actions receive negative partial credit; deterministic option termination rejects no-RSU idle speculative prefetch inside the policy option head without changing environment reward or evaluator rules.
  safety_constraints:
    reward_definition_changed: false
    action_contract_changed: false
    evaluator_window_class_gate_enabled: false
    hidden_used_for_selection: false

evaluation:
  allowed_selection_splits:
    - train
    - dev
  prohibited_selection_splits:
    - hidden_holdout
  future_validation_required_for_promotion: true
  dev_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/dev_window_plan.json
  full_dev_protocol:
    seeds: [7, 13, 29, 41, 53]
    windows: 20
    workflows_per_window: 2
    primary_vehicle_selection: handoff_pressure
    window_mode: full_stratified
  required_claim_checks:
    - sa_total_reward_above_v13_full_dev
    - sa_total_reward_above_all_compared_agents
    - backhaul_traffic_cost_not_above_popularity
    - mechanism_window_reward_margin_preserved
