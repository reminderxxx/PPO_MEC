profile: top_journal_mechanism_v33_env_action_ppo_mappo
purpose: >
  Extend v32 with an action-level clipped PPO branch over the final five-way
  semantic environment action. The goal is to let SA-GHMAPPO assign MAPPO actor
  credit directly to the executed handoff/cache/offload decision instead of
  relying only on hierarchical head log-probabilities and static priors.
algorithmic_delta:
  base_profile: top_journal_mechanism_v32_dt_continuation_mappo
  reward_function_changed: false
  environment_contract_changed: false
  baseline_contract_changed: false
  deterministic_action_wrapper_changed: false
  evaluation_wrapper_changed: false
  env_action_ppo_enabled: true
  env_action_ppo_coef: 0.72
  env_action_ppo_advantage_blend: 0.54
  env_action_ppo_teacher_coef: 0.34
  env_action_ppo_mechanism_focus: 0.65
  env_action_ppo_max_weight: 2.25
  counterfactual_teacher_prd_enabled: true
  digital_twin_policy_prior_enabled: true
  digital_twin_policy_prior_env_action_bias_enabled: true
  digital_twin_policy_prior_env_action_logit_bias: 3.20
  digital_twin_policy_prior_distill_coef: 0.090
training_budget:
  episodes: 128
  update_every: 8
  batch_size: 32
  train_window_count: 20
  max_steps: 22
segmented_strict_protocol:
  required_window_plan_root: configs/experiment/top_journal_v28_executable_handoff_strict_split_20260719
  protocol_version: strict_split_v3_segmented_executable_handoff_20260719
  max_mobility_rows: 5000000
  window_scan_stride: 8
evaluation:
  split_policy: train_dev_formal_then_one_time_hidden_after_candidate_freeze
  hidden_holdout_for_selection: prohibited
notes:
  - The action-level PPO branch uses the same actor logits and action mask as
    the hierarchical policy. It optimizes the executed semantic action with the
    PPO clipped objective, while the existing head-level MAPPO losses remain
    active.
  - Counterfactual teacher credit is used as advantage shaping inside PPO; it
    does not alter rewards, transition dynamics, masks, or benchmark summaries.
