profile: top_journal_mechanism_v31_handoff_pacing_mappo
purpose: >
  Add handoff-synchronized execution pacing to the v30 digital-twin policy
  prior. The actor learns to avoid over-eager workflow completion under high
  handoff risk and short-DAG slack, preserving opportunities for prepared
  migration while still using MAPPO advantage to decide when the prior should
  matter.
algorithmic_delta:
  base_profile: top_journal_mechanism_v30_dt_prior_mappo
  reward_function_changed: false
  environment_contract_changed: false
  baseline_contract_changed: false
  deterministic_action_wrapper_changed: false
  evaluation_wrapper_changed: false
  digital_twin_policy_prior_enabled: true
  digital_twin_policy_prior_pacing_enabled: true
  digital_twin_policy_prior_pacing_threshold: 0.30
  digital_twin_policy_prior_pacing_fast_scale: 1.35
  digital_twin_policy_prior_pacing_event_suppression: 0.72
  digital_twin_policy_prior_pacing_slow_suppression: 0.68
  digital_twin_policy_prior_pacing_short_dag_threshold: 10
  digital_twin_policy_prior_distill_coef: 0.105
training_budget:
  episodes: 128
  update_every: 8
  batch_size: 32
  train_window_count: 20
  max_steps: 22
segmented_strict_protocol:
  required_window_plan_root: configs/experiment/top_journal_v28_executable_handoff_strict_split_20260719
  protocol_version: strict_split_v3_segmented_executable_handoff_20260719
  max_mobility_rows: 5000000
  window_scan_stride: 8
evaluation:
  split_policy: train_dev_formal_then_one_time_hidden_after_candidate_freeze
  hidden_holdout_for_selection: prohibited
notes:
  - The pacing prior is part of the actor logits and the PPO distillation loss.
    It does not alter action masks, environment transitions, rewards, or
    benchmark aggregation.
  - The intended mechanism is model-based risk-aware option shaping: short
    DAGs under imminent handoff should not greedily consume all workflow nodes
    before migration can be realized.
