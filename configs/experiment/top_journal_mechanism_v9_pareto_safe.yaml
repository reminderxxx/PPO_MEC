experiment_name: top_journal_mechanism_v9_pareto_safe
output_root: artifacts/training/top_journal_mechanism_v9_pareto_safe
seeds: [7, 13, 29, 41, 53]

scope:
  objective: pareto_safe_followup_after_strict_full_v8
  parent_profile: top_journal_mechanism_v8_strict_full
  split_protocol: strict_split_v1_20260621
  statistics_protocol: hierarchical_window_bootstrap_v1_20260621
  claim_boundary: dev_or_new_future_validation_only_until_re_review
  hidden_holdout_policy: consumed_hidden_never_used_for_selection
  frozen_components:
    - VecWorkflowCoreEnv reward definition
    - semantic_discrete_5 action contract
    - controller-level baseline contracts
    - existing hidden holdout rows and statistics

training:
  script: scripts/train_sa_ghmappo_real_sample.py
  profile: top_journal_mechanism_v9_pareto_safe
  episodes: 96
  update_every: 8
  batch_size: 32
  max_steps: 16
  max_mobility_rows: 10000
  train_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/train_window_plan.json
  dev_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/dev_window_plan.json
  policy_repair:
    reward_definition_changed: false
    action_contract_changed: false
    steady_rsu_bias_enabled: true
    steady_rsu_bias_strength: 1.35
    steady_rsu_confidence_floor: 0.66
    continuity_guard_confidence_threshold: 0.68
    continuity_guard_prepare_score_threshold: 0.38
    predictive_prefetch_admission_min_confidence: 0.68
    backhaul_guard_enabled: true
    backhaul_guard_max_reactive_fills_per_adapter: 1
    cache_warm_start_guard_max_prefetch_countdown: 5.0
    checkpoint_selection_rule: best_by_pareto_safe_score
    rationale: keep reward competitive while penalizing handoff-failure and backhaul regressions

evaluation:
  allowed_selection_splits:
    - train
    - dev
  prohibited_selection_splits:
    - hidden_holdout
  future_validation_required_for_promotion: true
  formal_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/formal_window_plan.json
  existing_hidden_holdout_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/hidden_holdout_window_plan.json
  noninferiority_targets:
    reference_agent: ppo
    handoff_failure_benefit_ci_low_min: 0.0
    backhaul_benefit_ci_low_min: 0.0
  outer_cluster_keys: [window_id]
  inner_cluster_keys: [seed, workflow_id]
  ci_method: bca
  multiplicity_adjustment: holm
