profile: top_journal_mechanism_v30_dt_prior_mappo
purpose: >
  Convert the v29 digital-twin handoff representation into a learnable MAPPO
  policy prior. The prior biases slow/event logits and adds advantage-weighted
  distillation inside the PPO update so the actor can learn when to exploit
  high-risk handoff structure instead of passively consuming the features.
algorithmic_delta:
  base_profile: top_journal_mechanism_v29_dt_fused_credit_mappo
  reward_function_changed: false
  environment_contract_changed: false
  baseline_contract_changed: false
  deterministic_action_wrapper_changed: false
  evaluation_wrapper_changed: false
  digital_twin_handoff_fusion_enabled: true
  digital_twin_policy_prior_enabled: true
  digital_twin_policy_prior_logit_bias: 3.20
  digital_twin_policy_prior_event_scale: 1.22
  digital_twin_policy_prior_slow_scale: 0.82
  digital_twin_policy_prior_fast_scale: 0.20
  digital_twin_policy_prior_prepare_threshold: 0.16
  digital_twin_policy_prior_prefetch_threshold: 0.20
  digital_twin_policy_prior_confidence_floor: 0.18
  digital_twin_policy_prior_distill_coef: 0.095
  digital_twin_policy_prior_advantage_weight: 0.45
  mechanism_credit_prd_enabled: true
  mechanism_focal_aux_enabled: true
training_budget:
  episodes: 128
  update_every: 8
  batch_size: 32
  train_window_count: 20
  max_steps: 22
segmented_strict_protocol:
  required_window_plan_root: configs/experiment/top_journal_v28_executable_handoff_strict_split_20260719
  protocol_version: strict_split_v3_segmented_executable_handoff_20260719
  max_mobility_rows: 5000000
  window_scan_stride: 8
evaluation:
  split_policy: train_dev_formal_then_one_time_hidden_after_candidate_freeze
  hidden_holdout_for_selection: prohibited
notes:
  - The policy prior is inside the SA-GHMAPPO actor and PPO loss, not an
    external action wrapper or benchmark-time rule override.
  - The design follows model-based policy regularization and teacher-prior
    distillation ideas: a digital-twin handoff signal proposes high-risk
    slow/event targets, while MAPPO advantage controls how strongly they are
    reinforced.
