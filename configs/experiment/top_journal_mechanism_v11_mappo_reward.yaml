experiment_name: top_journal_mechanism_v11_mappo_reward
output_root: artifacts/training/top_journal_mechanism_v11_mappo_reward
seeds: [7, 13, 29, 41, 53]

scope:
  objective: reward_first_mappo_core_followup_after_v10
  parent_profile: top_journal_mechanism_v10_mappo_rl
  split_protocol: strict_split_v1_20260621
  statistics_protocol: hierarchical_window_bootstrap_v1_20260621
  claim_boundary: full_dev_evidence_only_until_new_holdout_re_review
  hidden_holdout_policy: consumed_hidden_never_used_for_selection
  frozen_components:
    - VecWorkflowCoreEnv reward definition
    - semantic_discrete_5 action contract
    - controller-level baseline contracts
    - existing hidden holdout rows and statistics

training:
  script: scripts/train_sa_ghmappo_real_sample.py
  profile: top_journal_mechanism_v11_mappo_reward
  episodes: 128
  update_every: 8
  batch_size: 32
  max_steps: 16
  max_mobility_rows: 10000
  train_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/train_window_plan.json
  dev_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/dev_window_plan.json
  checkpoint_selection_rule: best_by_reward
  mappo_core_transfer:
    centralized_critic: true
    head_credit_enabled: true
    head_credit_protocol: aggregation_reason_weighted_controller_ppo_v3
    slow_policy_credit_floor: 0.25
    fast_policy_credit_floor: 0.12
    event_policy_credit_floor: 0.12
    slow_entropy_credit_floor: 0.20
    fast_entropy_credit_floor: 0.09
    event_entropy_credit_floor: 0.12
    slow_entropy_coef_scale: 1.25
    fast_entropy_coef_scale: 1.0
    event_entropy_coef_scale: 1.35
    event_advantage_blend: 0.88
    rationale: transfer MAPPO CTDE credit assignment onto the stable v8 mechanism scaffold so reward learning does not collapse the event head
  rl_bias_reduction:
    heuristic_imitation_coef: 0.08
    mechanism_aux_coef: 0.08
    mechanism_window_weight: 1.45
    prepare_action_prior_weight: 0.55
    mechanism_aux_current_cache_fill_enabled: true
    rationale: keep the minimum mechanism scaffold needed for sparse-window reward, while still assigning policy gradients through MAPPO controller credits
  reward_first_controls:
    entropy_coef: 0.0012
    train_epochs: 7
    target_kl: 0.012
    steady_rsu_bias_strength: 1.20
    predictive_prefetch_admission_min_confidence: 0.62
    checkpoint_selection_rule: best_by_reward
    anti_collapse_controls_enabled: true
    idle_popularity_fallback_enabled: true
    idle_popularity_fallback_only_vehicle_fallback: true
    idle_popularity_prefetch_threshold: 2
    idle_popularity_no_rsu_local_fallback_enabled: false
    idle_popularity_no_rsu_local_requires_low_context: true
    idle_popularity_no_rsu_window_class_gate: idle_or_sparse
    idle_popularity_no_rsu_window_class_requires_low_context: false
    idle_popularity_fallback_scope: deterministic_vehicle_fallback_plus_idle_or_sparse_window_gated_no_rsu_local
  safety_constraints:
    reward_definition_changed: false
    action_contract_changed: false
    backhaul_guard_enabled: true
    backhaul_guard_max_reactive_fills_per_adapter: 1
    cache_warm_start_guard_max_prefetch_countdown: 5.0

evaluation:
  allowed_selection_splits:
    - train
    - dev
  prohibited_selection_splits:
    - hidden_holdout
  future_validation_required_for_promotion: true
  dev_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/dev_window_plan.json
  formal_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/formal_window_plan.json
  existing_hidden_holdout_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/hidden_holdout_window_plan.json
  full_dev_protocol:
    seeds: [7, 13, 29, 41, 53]
    windows: 20
    workflows_per_window: 2
    primary_vehicle_selection: handoff_pressure
    window_mode: full_stratified
  required_claim_checks:
    - sa_total_reward_above_all_compared_agents
    - sa_total_reward_above_parent_v8_reference
  outer_cluster_keys: [window_id]
  inner_cluster_keys: [seed, workflow_id]
  ci_method: bca
  multiplicity_adjustment: holm
