algorithm: mappo
support_level: trainable
priority_tier: tier1
family: mappo
observation_contract: flat_semantic_multi_controller_ctde_v1
action_contract: semantic_discrete_5_multi_controller_3head
checkpoint_required: true
paper_grade_independent_baseline: true
policy:
  graph_encoder: false
  hierarchy: true
  event_head_enabled: true
  controller_head_credit: true
  head_credit_protocol: aggregation_reason_weighted_controller_ppo_v3
  head_credit_basis: controller_head_anti_collapse_credit_assignment_not_sa_specific
  controller_head_credit_floors:
    slow: 0.25
    fast: 0.10
    event: 0.12
  controller_entropy_credit_floors:
    slow: 0.20
    fast: 0.08
    event: 0.12
  controller_entropy_scales:
    slow: 1.25
    fast: 1.00
    event: 1.35
  multi_controller_ctde: true
  controller_agents:
    - cache_agent
    - execution_agent
    - handoff_event_agent
  surrogate_enhanced_head: false
  centralized_critic: true
  centralized_critic_context: global_semantic_flat_v1
  ctde_scope: controller_level_cache_execution_handoff
  vehicle_or_rsu_agent_ctde: false
  contract_blocked_reason: ""
  excluded_sa_mechanisms:
    - graph_encoder
    - surrogate_prediction_features
    - uncertainty_signal
    - dag_dependency_aware_features
    - mechanism_auxiliary_loss
    - heuristic_imitation
    - continuity_guard
    - backhaul_guard
    - cache_warm_start_guard
    - predictive_prefetch_admission_guard
training:
  trainer: marl_on_policy_trainer
  learning_rate: 0.0002
  clip_ratio: 0.16
  entropy_coef: 0.015
  value_coef: 0.65
  batch_size: 32
  train_epochs: 8
  target_kl: 0.018
  kl_early_stop_enabled: true
  max_grad_norm: 0.7
  head_credit_enabled: true
  head_credit_protocol: aggregation_reason_weighted_controller_ppo_v3
  slow_policy_credit_floor: 0.25
  fast_policy_credit_floor: 0.10
  event_policy_credit_floor: 0.12
  slow_entropy_coef_scale: 1.25
  fast_entropy_coef_scale: 1.00
  event_entropy_coef_scale: 1.35
  slow_entropy_credit_floor: 0.20
  fast_entropy_credit_floor: 0.08
  event_entropy_credit_floor: 0.12
  event_advantage_blend: 0.85
export:
  train_csv: train.csv
  eval_csv: eval.csv
  summary_json: summary.json
