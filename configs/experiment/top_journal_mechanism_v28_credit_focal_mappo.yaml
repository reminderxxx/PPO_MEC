profile: top_journal_mechanism_v28_credit_focal_mappo
purpose: >
  Strengthen the main MAPPO-line method with mechanism-level partial-reward
  credit assignment and focal auxiliary learning for rare executable handoff
  events. The goal is to enlarge the reward gap by improving how the learned
  policy credits migration prepare, validated prefetch, and handoff-ready
  outcomes inside the PPO update.
algorithmic_delta:
  base_profile: top_journal_mechanism_v20_idle_execution_prd
  reward_function_changed: false
  environment_contract_changed: false
  baseline_contract_changed: false
  deterministic_action_wrapper_changed: false
  evaluation_wrapper_changed: false
  mechanism_credit_prd_enabled: true
  mechanism_credit_policy_coef: 0.30
  mechanism_credit_event_coef: 0.85
  mechanism_credit_option_coef: 0.42
  mechanism_credit_clip: 1.80
  mechanism_focal_aux_enabled: true
  mechanism_focal_gamma: 1.40
  mechanism_aux_current_cache_fill_enabled: false
  conservative_imitation_enabled: true
  conservative_imitation_reward_quantile: 0.36
  tail_risk_prd_enabled: false
  opportunity_prd_enabled: false
  counterfactual_teacher_prd_enabled: false
training_budget:
  episodes: 128
  update_every: 8
  batch_size: 32
  train_window_count: 20
  max_steps: 22
segmented_strict_protocol:
  required_window_plan_root: configs/experiment/top_journal_v28_executable_handoff_strict_split_20260719
  protocol_version: strict_split_v3_segmented_executable_handoff_20260719
  max_mobility_rows: 5000000
  window_scan_stride: 8
  layout_candidates:
    - auto_dominant_tight
    - lust_micro
    - tight_y
    - tight_x
    - auto_grid_tight
  window_count_per_split: 20
  targets_per_split:
    mechanism_activating: 14
    active_non_mechanism: 4
    idle_or_sparse: 2
evaluation:
  split_policy: train_dev_formal_then_one_time_hidden_after_candidate_freeze
  hidden_holdout_for_selection: prohibited
notes:
  - This profile changes only MAPPO training internals: advantage credit,
    option/event-head learning signals, and auxiliary classification weighting.
  - The v28 split is required because mechanism windows must contain actual
    executable handoff events; high-activity zero-handoff windows are not
    sufficient evidence for mechanism learning.
