experiment_name: top_journal_mechanism_v12_learned_option
output_root: artifacts/training/top_journal_mechanism_v12_learned_option
seeds: [7, 13, 29, 41, 53]

scope:
  objective: learned_mappo_option_gate_after_v11
  parent_profile: top_journal_mechanism_v11_mappo_reward
  split_protocol: strict_split_v1_20260621
  claim_boundary: full_dev_evidence_only_until_future_validation
  hidden_holdout_policy: consumed_hidden_never_used_for_selection
  frozen_components:
    - VecWorkflowCoreEnv reward definition
    - semantic_discrete_5 action contract
    - controller-level baseline contracts
    - existing hidden holdout rows and statistics

training:
  script: scripts/train_sa_ghmappo_real_sample.py
  profile: top_journal_mechanism_v12_learned_option
  episodes: 128
  update_every: 8
  batch_size: 32
  max_steps: 16
  max_mobility_rows: 10000
  train_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/train_window_plan.json
  dev_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/dev_window_plan.json
  checkpoint_selection_rule: best_by_reward
  mappo_core_transfer:
    centralized_critic: true
    head_credit_enabled: true
    head_credit_protocol: aggregation_reason_weighted_controller_ppo_v3
    event_advantage_blend: 0.88
  learned_option_gate:
    enabled: true
    option_labels:
      - accept_mappo
      - popularity_safe
      - no_rsu_local
      - mechanism_prepare
    option_gate_loss_coef: 0.28
    option_gate_entropy_coef: 0.0012
    option_gate_prior_coef: 0.045
    option_gate_prior_warmup_updates: 5
    option_gate_prior_decay: 0.78
    option_gate_prior_logit_bias: 0.6
    option_gate_log_prob_weight: 0.35
    option_gate_context_prior_enabled: true
    option_gate_deterministic_prior_margin: 0.18
    option_gate_idle_prior_enabled: true
    window_class_used_by_policy: true
    rationale: learn when to accept MAPPO, borrow a safe popularity option, use no-RSU local fallback, or preserve mechanism prepare; window_class is used as a contextual prior, while MAPPO can override it when option probability margin is strong.
  safety_constraints:
    reward_definition_changed: false
    action_contract_changed: false
    evaluator_window_class_gate_enabled: false

evaluation:
  allowed_selection_splits:
    - train
    - dev
  prohibited_selection_splits:
    - hidden_holdout
  future_validation_required_for_promotion: true
  dev_window_plan_path: configs/experiment/top_journal_v8_strict_split_20260621/dev_window_plan.json
  full_dev_protocol:
    seeds: [7, 13, 29, 41, 53]
    windows: 20
    workflows_per_window: 2
    primary_vehicle_selection: handoff_pressure
    window_mode: full_stratified
  required_claim_checks:
    - sa_total_reward_above_all_compared_agents
    - sa_total_reward_margin_above_popularity_not_close
    - idle_sparse_gap_reduced_without_mechanism_window_regression
