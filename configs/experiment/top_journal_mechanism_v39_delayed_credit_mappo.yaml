profile: top_journal_mechanism_v39_delayed_credit_mappo
purpose: >
  Add trajectory-level delayed mechanism credit to the MAPPO update so future
  handoff-ready and mechanism-success outcomes can correct earlier
  prepare/prefetch decisions inside the same rollout segment.
algorithmic_delta:
  base_profile: top_journal_mechanism_v35_guard_relaxed_action_mappo
  reward_function_changed: false
  environment_contract_changed: false
  baseline_contract_changed: false
  deterministic_action_wrapper_changed: false
  evaluation_wrapper_changed: false
  delayed_mechanism_credit_enabled: true
  delayed_mechanism_credit_policy_coef: 0.46
  delayed_mechanism_credit_event_coef: 1.05
  delayed_mechanism_credit_horizon: 5
  delayed_mechanism_credit_decay: 0.72
  delayed_mechanism_credit_clip: 1.80
  env_action_ppo_enabled: true
  env_action_ppo_coef: 1.06
  env_action_ppo_teacher_coef: 0.46
  env_action_counterfactual_margin_enabled: false
  hard_guards_enabled: false
training_budget:
  episodes: 128
  update_every: 8
  batch_size: 32
  train_window_count: 20
  max_steps: 22
segmented_strict_protocol:
  required_window_plan_root: configs/experiment/top_journal_v28_executable_handoff_strict_split_20260719
  protocol_version: strict_split_v3_segmented_executable_handoff_20260719
  max_mobility_rows: 5000000
  window_scan_stride: 8
evaluation:
  split_policy: train_dev_formal_then_one_time_hidden_after_candidate_freeze
  hidden_holdout_for_selection: prohibited
notes:
  - This profile changes only the MAPPO-side credit assignment. It uses future
    observed mechanism outcomes as an advantage correction within an episode
    segment and never rewrites benchmark rewards or evaluation actions.
  - A dev improvement remains a candidate signal only; paper claims still
    require the frozen formal/holdout protocol and statistical evidence.
